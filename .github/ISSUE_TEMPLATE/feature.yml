name: Maintainer feature
description: Propose a scoped post-gate capability
title: "[feature] "
labels: [enhancement]
body:
  - type: textarea
    id: need
    attributes:
      label: User need and current evidence
    validations:
      required: true
  - type: dropdown
    id: phase
    attributes:
      label: Earliest allowed phase
      options: [P0, P1, P2, P3, P4, P5, P6, P7, P8, P9]
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance, diagnostics, and rollback
    validations:
      required: true
