name: Build Arch RootFS And GRUB

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create/update. Leave empty to only upload Actions artifacts.
        required: false
        type: string
      output_prefix:
        description: Output file prefix used for rootfs, grub and artifact names.
        required: true
        default: TB321FU-archlinuxarm-plasma-aarch64
        type: string
      arch_rootfs_url:
        description: Arch Linux ARM aarch64 rootfs tarball URL.
        required: true
        default: https://os.archlinuxarm.org/os/ArchLinuxARM-aarch64-latest.tar.gz
        type: string
      arch_rootfs_sha256:
        description: Required SHA-256 for the selected Arch Linux ARM rootfs tarball.
        required: true
        type: string
      arch_mirror:
        description: pacman mirror Server line.
        required: true
        default: http://os.archlinuxarm.org/$arch/$repo
        type: string
      desktop_profile:
        description: Plasma package profile. standard is recommended for first builds.
        required: true
        default: standard
        type: choice
        options:
          - minimal
          - standard
          - full
      rootfs_image_size:
        description: rootfs ext4 image size.
        required: true
        default: 20G
        type: string
      rootfs_label:
        description: rootfs ext4 label.
        required: true
        default: ArchLinux
        type: string
      rootfs_partlabel:
        description: target GPT partition label expected by GRUB/root selector.
        required: true
        default: userdata
        type: string
      hostname_name:
        description: hostname written to /etc/hostname.
        required: true
        default: GUF296
        type: string
      default_user_name:
        description: normal user to create.
        required: true
        default: GUF296
        type: string
      root_password_mode:
        description: Root password handling; set uses repository secret ROOT_PASSWORD_HASH.
        required: true
        default: locked
        type: choice
        options:
          - locked
          - set
          - empty
      user_sudo_mode:
        description: sudo rights for default user.
        required: true
        default: password
        type: choice
        options:
          - password
          - nopasswd
          - none
      sddm_autologin:
        description: enable SDDM autologin for default user.
        required: true
        default: true
        type: boolean
      boot_image_size:
        description: GRUB/FAT image size when not using a template.
        required: true
        default: 256M
        type: string
      rootfs_config:
        description: Optional advanced rootfs config, one KEY=value per line.
        required: false
        default: ""
        type: string
      boot_config:
        description: Optional advanced boot config, one KEY=value per line.
        required: false
        default: ""
        type: string
      source_config:
        description: Optional advanced source/kernel config, one KEY=value per line.
        required: false
        default: ""
        type: string

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            dosfstools mtools e2fsprogs rsync curl unzip tar xz-utils zstd p7zip-full \
            gdisk qemu-utils sudo ca-certificates gnupg binutils dpkg-dev kmod

      - name: Apply workflow configuration
        env:
          INPUT_ARCH_ROOTFS_URL: ${{ inputs.arch_rootfs_url }}
          INPUT_ARCH_ROOTFS_SHA256: ${{ inputs.arch_rootfs_sha256 }}
          INPUT_ARCH_MIRROR: ${{ inputs.arch_mirror }}
          INPUT_DESKTOP_PROFILE: ${{ inputs.desktop_profile }}
          INPUT_ROOTFS_IMAGE_SIZE: ${{ inputs.rootfs_image_size }}
          INPUT_ROOTFS_LABEL: ${{ inputs.rootfs_label }}
          INPUT_ROOTFS_PARTLABEL: ${{ inputs.rootfs_partlabel }}
          INPUT_HOSTNAME_NAME: ${{ inputs.hostname_name }}
          INPUT_DEFAULT_USER_NAME: ${{ inputs.default_user_name }}
          INPUT_ROOT_PASSWORD_MODE: ${{ inputs.root_password_mode }}
          INPUT_USER_SUDO_MODE: ${{ inputs.user_sudo_mode }}
          INPUT_SDDM_AUTOLOGIN: ${{ inputs.sddm_autologin }}
          INPUT_BOOT_IMAGE_SIZE: ${{ inputs.boot_image_size }}
          INPUT_ROOTFS_CONFIG: ${{ inputs.rootfs_config }}
          INPUT_BOOT_CONFIG: ${{ inputs.boot_config }}
          INPUT_SOURCE_CONFIG: ${{ inputs.source_config }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/build-config-notes"

          cat > "$RUNNER_TEMP/rootfs.env" <<'CONFIG_EOF'
          ARCH_ROOTFS_URL=https://os.archlinuxarm.org/os/ArchLinuxARM-aarch64-latest.tar.gz
          ARCH_ROOTFS_SHA256=
          ARCH_MIRROR=http://os.archlinuxarm.org/$arch/$repo
          ROOTFS_IMAGE_SIZE=20G
          ROOTFS_LABEL=ArchLinux
          ROOTFS_PARTLABEL=userdata
          HOSTNAME_NAME=GUF296
          DEFAULT_USER_NAME=GUF296
          ROOT_PASSWORD_MODE=locked
          USER_SUDO_MODE=password
          SDDM_AUTOLOGIN=1
          SDDM_AUTOLOGIN_SESSION=plasma
          TZ_REGION=Asia/Shanghai
          LOCALES=en_US.UTF-8 zh_CN.UTF-8
          LANG_NAME=zh_CN.UTF-8
          DESKTOP_PROFILE=standard
          PACKAGE_LIST=
          INSTALL_FCITX5_CHINESE=1
          INSTALL_FIREFOX=1
          INSTALL_CAMERA_APPS=1
          DEVICE_DEB_ARCHIVE=https://github.com/GUF296/ubuntu-y700-build-ci/releases/download/bootstrap-y700-20260625/y700-device-debs-20260624-201420-compat1.tar.gz
          DEVICE_DEB_ARCHIVE_SHA256=047c1baccc420f1c28bf6d761cfc811dd7aeccfcbab6d03746ca01daf6cdfe04
          DEVICE_DEB_DIR=
          SENSOR_DEB_ARCHIVE=https://github.com/GUF296/tb321fu-sensor-debs/releases/download/tb321fu-sensor-debs-20260627.1/tb321fu-sensor-debs_20260627.1_arm64.tar.gz
          SENSOR_DEB_ARCHIVE_SHA256=62ebf6fb41730b9f52da2efc99ac5807fd41dd39d7f97dea070ba5f5ce34ab10
          SENSOR_DEB_DIR=
          HAPTICS_DEB_ARCHIVE=https://github.com/GUF296/tb321fu-haptics-debs/releases/download/tb321fu-haptics-debs-20260627.2/tb321fu-haptics-debs_20260627.2_arm64.tar.gz
          HAPTICS_DEB_ARCHIVE_SHA256=5a87f510ad07ba60a8a2a663a0782e6f186a56b1586d52c816425fab45b20a37
          HAPTICS_DEB_DIR=
          CAMERA_STACK_ARCHIVE=
          CAMERA_STACK_ARCHIVE_SHA256=
          CAMERA_STACK_DIR=
          BUILD_TB321FU_GPU_SENSOR=1
          TB321FU_GPU_SENSOR_SOURCE_ARCHIVE=
          TB321FU_GPU_SENSOR_SOURCE_ARCHIVE_SHA256=
          TB321FU_GPU_SENSOR_SOURCE_DIR=
          TB321FU_GPU_SENSOR_BUILD_JOBS=2
          OVERLAY_ARCHIVE=
          OVERLAY_ARCHIVE_SHA256=
          OVERLAY_DIR=
          KERNEL_VERSION=7.1.1-g5df8e852ea72
          APPLY_Y700_FIRMWARE_FIXES=1
          APPLY_Y700_AUDIO_POLICY_FIXES=1
          COMPRESS=7z
          CHUNK_SIZE=
          KEEP_RAW_IMAGE=0
          CONFIG_EOF

          cat > "$RUNNER_TEMP/boot.env" <<'CONFIG_EOF'
          BOOT_TEMPLATE_IMAGE=https://github.com/GUF296/ubuntu-y700-build-ci/releases/download/bootstrap-y700-20260625/y700-verified-grub-template-userdata-20260624-201420.img
          BOOT_TEMPLATE_IMAGE_SHA256=7136020f5c736e13772980af5d22652e71281f34ce3da7b22add928a62ebd194
          BOOT_TEMPLATE_IMAGE_URL=
          BOOT_IMAGE_SIZE=256M
          BOOT_FAT_BITS=32
          BOOT_FAT_LABEL=Y700GRUB
          BOOT_SECTOR_SIZE=512
          BOOT_CLUSTER_SECTORS=
          ROOT_SELECTOR=partlabel
          ROOT_PARTLABEL=userdata
          ROOT_UUID=
          ROOTARGS=
          ROOTARGS_EXTRA=
          STABLEARGS=drm_client_lib.active=none
          BOOT_COMPRESS=7z
          BOOT_CHUNK_SIZE=
          KEEP_BOOT_IMAGE=0
          CONFIG_EOF

          cat > "$RUNNER_TEMP/source.env" <<'CONFIG_EOF'
          KERNEL_ARTIFACT_ARCHIVE=https://github.com/GUF296/ubuntu-y700-build-ci/releases/download/bootstrap-y700-20260625/y700-kernel-artifacts-7.1.1-g5df8e852ea72.tar.gz
          KERNEL_ARTIFACT_ARCHIVE_SHA256=86ea0190e3a073a8ce94e1d6f74dcc3482457a0b9161c2ff968aaeb0f1147188
          BOOTAA64_EFI_URL=
          BOOTAA64_EFI_SHA256=
          QCOMRAMP_EFI=
          QCOMRAMP_EFI_URL=
          QCOMRAMP_EFI_SHA256=
          QCOMRAMP_CFG_NAME=qcomramp.cfg
          GRUB_BUILD_ARCHIVE=
          GRUB_BUILD_ARCHIVE_SHA256=
          DTB_NAME=sm8650-lenovo-tb321fu.dtb
          CONFIG_EOF

          append_config() {
            local file=$1
            local content=$2
            [ -n "$content" ] || return 0
            printf '\n# workflow input override\n%s\n' "$content" >> "$file"
          }

          append_config "$RUNNER_TEMP/rootfs.env" "$INPUT_ROOTFS_CONFIG"
          append_config "$RUNNER_TEMP/boot.env" "$INPUT_BOOT_CONFIG"
          append_config "$RUNNER_TEMP/source.env" "$INPUT_SOURCE_CONFIG"

          cat >> "$RUNNER_TEMP/rootfs.env" <<CONFIG_EOF
          ARCH_ROOTFS_URL=$INPUT_ARCH_ROOTFS_URL
          ARCH_ROOTFS_SHA256=$INPUT_ARCH_ROOTFS_SHA256
          ARCH_MIRROR=$INPUT_ARCH_MIRROR
          DESKTOP_PROFILE=$INPUT_DESKTOP_PROFILE
          ROOTFS_IMAGE_SIZE=$INPUT_ROOTFS_IMAGE_SIZE
          ROOTFS_LABEL=$INPUT_ROOTFS_LABEL
          ROOTFS_PARTLABEL=$INPUT_ROOTFS_PARTLABEL
          HOSTNAME_NAME=$INPUT_HOSTNAME_NAME
          DEFAULT_USER_NAME=$INPUT_DEFAULT_USER_NAME
          ROOT_PASSWORD_MODE=$INPUT_ROOT_PASSWORD_MODE
          USER_SUDO_MODE=$INPUT_USER_SUDO_MODE
          SDDM_AUTOLOGIN=$INPUT_SDDM_AUTOLOGIN
          CONFIG_EOF

          cat >> "$RUNNER_TEMP/boot.env" <<CONFIG_EOF
          BOOT_IMAGE_SIZE=$INPUT_BOOT_IMAGE_SIZE
          ROOT_PARTLABEL=$INPUT_ROOTFS_PARTLABEL
          CONFIG_EOF

          bash scripts/ci/apply-workflow-config.sh "$RUNNER_TEMP/rootfs.env"
          bash scripts/ci/apply-workflow-config.sh "$RUNNER_TEMP/boot.env"
          bash scripts/ci/apply-workflow-config.sh "$RUNNER_TEMP/source.env"

          cp "$RUNNER_TEMP/rootfs.env" "$RUNNER_TEMP/build-config-notes/rootfs.env"
          cp "$RUNNER_TEMP/boot.env" "$RUNNER_TEMP/build-config-notes/boot.env"
          cp "$RUNNER_TEMP/source.env" "$RUNNER_TEMP/build-config-notes/source.env"
          echo "BUILD_CONFIG_NOTES_DIR=$RUNNER_TEMP/build-config-notes" >> "$GITHUB_ENV"
          echo "OUTPUT_PREFIX=${{ inputs.output_prefix }}" >> "$GITHUB_ENV"
          echo "OUTPUT_DIR_ROOTFS=out/ci-rootfs" >> "$GITHUB_ENV"
          echo "OUTPUT_DIR_GRUB=out/ci-grub" >> "$GITHUB_ENV"

      - name: Build rootfs image
        env:
          DEFAULT_USER_PASSWORD_HASH: ${{ secrets.DEFAULT_USER_PASSWORD_HASH }}
          ROOT_PASSWORD_HASH: ${{ secrets.ROOT_PASSWORD_HASH }}
        run: |
          set -euo pipefail
          mkdir -p "$OUTPUT_DIR_ROOTFS"
          sudo --preserve-env=OUTPUT_PREFIX,ARCH_ROOTFS_URL,ARCH_ROOTFS_SHA256,ARCH_MIRROR,http_proxy,https_proxy,HTTP_PROXY,HTTPS_PROXY,ROOTFS_IMAGE_SIZE,ROOTFS_LABEL,ROOTFS_PARTLABEL,HOSTNAME_NAME,DEFAULT_USER_NAME,DEFAULT_USER_PASSWORD_HASH,ROOT_PASSWORD_MODE,ROOT_PASSWORD_HASH,USER_SUDO_MODE,SDDM_AUTOLOGIN,SDDM_AUTOLOGIN_SESSION,TZ_REGION,LOCALES,LANG_NAME,DESKTOP_PROFILE,PACKAGE_LIST,INSTALL_FCITX5_CHINESE,INSTALL_FIREFOX,INSTALL_CAMERA_APPS,DEVICE_DEB_ARCHIVE,DEVICE_DEB_ARCHIVE_SHA256,DEVICE_DEB_DIR,SENSOR_DEB_ARCHIVE,SENSOR_DEB_ARCHIVE_SHA256,SENSOR_DEB_DIR,HAPTICS_DEB_ARCHIVE,HAPTICS_DEB_ARCHIVE_SHA256,HAPTICS_DEB_DIR,CAMERA_STACK_ARCHIVE,CAMERA_STACK_ARCHIVE_SHA256,CAMERA_STACK_DIR,BUILD_TB321FU_GPU_SENSOR,TB321FU_GPU_SENSOR_SOURCE_ARCHIVE,TB321FU_GPU_SENSOR_SOURCE_ARCHIVE_SHA256,TB321FU_GPU_SENSOR_SOURCE_DIR,TB321FU_GPU_SENSOR_BUILD_JOBS,OVERLAY_ARCHIVE,OVERLAY_ARCHIVE_SHA256,OVERLAY_DIR,KERNEL_VERSION,APPLY_Y700_FIRMWARE_FIXES,APPLY_Y700_AUDIO_POLICY_FIXES,COMPRESS,CHUNK_SIZE,KEEP_RAW_IMAGE \
            env OUTPUT_DIR="$OUTPUT_DIR_ROOTFS" bash scripts/ci/build-arch-rootfs-image.sh

      - name: Build GRUB boot image
        run: |
          set -euo pipefail
          mkdir -p "$OUTPUT_DIR_GRUB"
          sudo --preserve-env=OUTPUT_PREFIX,BOOT_TEMPLATE_IMAGE,BOOT_TEMPLATE_IMAGE_URL,BOOT_TEMPLATE_IMAGE_SHA256,BOOT_IMAGE_SIZE,BOOT_FAT_BITS,BOOT_FAT_LABEL,BOOT_SECTOR_SIZE,BOOT_CLUSTER_SECTORS,KERNEL_ARTIFACT_ARCHIVE,KERNEL_ARTIFACT_ARCHIVE_SHA256,BOOTAA64_EFI_URL,BOOTAA64_EFI_SHA256,QCOMRAMP_EFI,QCOMRAMP_EFI_URL,QCOMRAMP_EFI_SHA256,QCOMRAMP_CFG_NAME,DTB_NAME,ROOT_SELECTOR,ROOT_PARTLABEL,ROOT_UUID,ROOTARGS,ROOTARGS_EXTRA,STABLEARGS,BOOT_COMPRESS,BOOT_CHUNK_SIZE,KEEP_BOOT_IMAGE,http_proxy,https_proxy,HTTP_PROXY,HTTPS_PROXY \
            env OUTPUT_DIR="$OUTPUT_DIR_GRUB" bash scripts/ci/build-grub-image.sh

      - name: Write combined checksums
        run: |
          set -euo pipefail
          mkdir -p out/ci-release
          install -m 0644 source/boot-image/boot.img.7z out/ci-release/boot.img.7z
          bash scripts/ci/write-portable-checksums.sh \
            out/ci-release/SHA256SUMS.txt \
            "$OUTPUT_DIR_ROOTFS" "$OUTPUT_DIR_GRUB" out/ci-release/boot.img.7z

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.output_prefix }}-rootfs-grub
          path: |
            out/ci-rootfs/*
            out/ci-grub/*
            out/ci-release/boot.img.7z
            out/ci-release/SHA256SUMS.txt

      - name: Upload metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.output_prefix }}-metadata
          path: |
            out/ci-rootfs/*.BUILD-INFO.txt
            out/ci-rootfs/*.SHA256SUMS
            out/ci-rootfs/*.manifest
            out/ci-rootfs/*.packages
            out/ci-rootfs/*.raw.sha256
            out/ci-grub/*.SHA256SUMS
            out/ci-grub/*.raw.sha256
            out/ci-release/boot.img.7z
            out/ci-release/SHA256SUMS.txt
            ${{ env.BUILD_CONFIG_NOTES_DIR }}/*

      - name: Upload release assets
        if: ${{ inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          release_dir=out/ci-release/assets
          [ "$release_dir" = out/ci-release/assets ] || {
            echo "refusing unbounded release staging cleanup: $release_dir" >&2
            exit 1
          }
          rm -rf "$release_dir"
          mkdir -p "$release_dir"

          select_release_asset() {
            local source_dir=$1
            local source_prefix=$2
            local release_name=$3
            local compress=$4
            local chunk_size=$5
            local suffix src dest

            case "$compress" in
              none) suffix=.img; src="$source_dir/$source_prefix" ;;
              zstd) suffix=.img.zst; src="$source_dir/$source_prefix.zst" ;;
              xz) suffix=.img.xz; src="$source_dir/$source_prefix.xz" ;;
              7z)
                if [ -n "$chunk_size" ]; then
                  echo "Release upload expects a single $release_name archive; clear CHUNK_SIZE/BOOT_CHUNK_SIZE instead of using 7z volumes." >&2
                  exit 1
                fi
                suffix=.img.7z
                src="$source_dir/$source_prefix.7z"
                ;;
              *) echo "unsupported $release_name compression: $compress" >&2; exit 1 ;;
            esac

            [ -f "$src" ] || { echo "missing release $release_name asset: $src" >&2; exit 1; }
            dest="$release_dir/${release_name}${suffix}"
            cp -a "$src" "$dest"
          }

          select_release_asset "$OUTPUT_DIR_ROOTFS" "${OUTPUT_PREFIX}-rootfs.img" rootfs "${COMPRESS:-7z}" "${CHUNK_SIZE:-}"
          select_release_asset "$OUTPUT_DIR_GRUB" "${OUTPUT_PREFIX}-grub-fat.img" grub "${BOOT_COMPRESS:-7z}" "${BOOT_CHUNK_SIZE:-}"
          install -m 0644 source/boot-image/boot.img.7z "$release_dir/boot.img.7z"

          split_large_release_assets() {
            local max_bytes=1992294400
            local asset size
            while IFS= read -r -d '' asset; do
              size=$(stat -c '%s' "$asset")
              if [ "$size" -le "$max_bytes" ]; then
                continue
              fi
              echo "Splitting release asset larger than GitHub's 2GB limit: $asset ($size bytes)"
              split -b 1900M -d -a 3 "$asset" "$asset."
              rm -f "$asset"
            done < <(find "$release_dir" -maxdepth 1 -type f -print0)
          }

          split_large_release_assets
          (cd "$release_dir" && sha256sum * > SHA256SUMS.txt)

          notes=out/ci-release/BUILD-PARAMETERS.md
          {
            echo '# Build Parameters'
            echo
            echo "- Output prefix: \`$OUTPUT_PREFIX\`"
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- Workflow run: \`$GITHUB_RUN_ID\`"
            echo
            echo 'This release contains Arch Linux ARM Plasma assets for Lenovo Y700 / TB321FU.'
            echo 'Password hashes are supplied only through step-scoped secrets and are never serialized into build configuration or release notes.'
            echo
            echo 'The release asset names are intentionally short: `boot.img.7z`, `grub.img.7z`, and split rootfs parts such as `rootfs.img.7z.000` / `rootfs.img.7z.001`.'
            echo
            echo 'Assets ending in `.NNN` are split only to satisfy the GitHub Release 2GB per-asset limit. Recombine them in lexical order before extraction, for example: `cat rootfs.img.7z.* > rootfs.img.7z`.'
            echo
            echo '## RootFS Config'
            echo '```text'
            cat "${BUILD_CONFIG_NOTES_DIR:?}/rootfs.env"
            echo '```'
            echo
            echo '## Boot Config'
            echo '```text'
            cat "${BUILD_CONFIG_NOTES_DIR:?}/boot.env"
            echo '```'
            echo
            echo '## Source Config'
            echo '```text'
            cat "${BUILD_CONFIG_NOTES_DIR:?}/source.env"
            echo '```'
          } > "$notes"

          bash scripts/ci/publish-release.sh "$RELEASE_TAG" "$release_dir" "$notes"
